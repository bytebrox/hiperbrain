name: Feature request
description: Suggest an idea or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's missing or hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? API sketches welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they fall short.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "@hiperbrain/core (SDK)"
        - Hosted API (/api/...)
        - Website / UI
        - Tokens / credits / wallet
        - Other
    validations:
      required: true
