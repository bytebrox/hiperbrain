name: Bug report
description: Report something that is broken or behaving unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. For security issues, do **not**
        use this form — see [SECURITY.md](../blob/master/SECURITY.md) instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I ask "capital of France" via the SDK client, I get ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps (or a code snippet) that trigger the bug.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "@hiperbrain/core (SDK)"
        - Hosted API (/api/...)
        - Website / UI
        - Tokens / credits / wallet
        - Other / not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: "@hiperbrain/core version, or the site commit/URL."
      placeholder: "@hiperbrain/core 0.4.0"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, browser — whatever is relevant.
      placeholder: "Node 20.11, Chrome 126, macOS 14"
