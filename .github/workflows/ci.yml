name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      # Use `npm install` rather than `npm ci`: the lockfile is generated on
      # Windows and omits Linux-only optional native deps (lightningcss/@emnapi),
      # which makes the strict `npm ci` sync check fail on the Linux runner.
      - run: npm install --no-audit --no-fund
      - name: Build @hiperbrain/core
        run: npm run build:core
      - name: Typecheck @hiperbrain/core
        run: npm run typecheck --workspace @hiperbrain/core
      - name: Run tests
        run: npm test
