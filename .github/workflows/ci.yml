name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build @hiperbrain/core
        run: npm run build:core
      - name: Typecheck @hiperbrain/core
        run: npm run typecheck --workspace @hiperbrain/core
      - name: Run tests
        run: npm test
